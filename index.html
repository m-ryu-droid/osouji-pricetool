<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>業務効率化ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="layout-bottom view-calc"> <div class="main-tool-tabs">
        <button class="main-tab-btn active" id="main-tab-calc" onclick="switchMainTool('calc')">📊 料金見積計算</button>
        <button class="main-tab-btn" id="main-tab-editor" onclick="switchMainTool('editor')">📝 顧客文章整理</button>
    </div>

    <div class="container">
        
        <div id="calc-tool-section">
            <header>
                <h1>見積料金計算ツール</h1>
                <div class="subtitle">メニューとオプションを選択してください（すべて税込表記）</div>
            </header>
            <div id="menu-container"></div>
        </div>

        <div id="editor-tool-section" style="display: none;">
            <header>
                <h1>顧客文章整理ツール</h1>
                <div class="subtitle">コピーした長文を貼り付けると、自動で項目別に整理します</div>
            </header>
            
            <div class="editor-box">
                <textarea id="raw-text-input" placeholder="ここに文章をそのまま貼り付けてください...&#10;（例：訪問第１希望日2026-05-14希望時間帯15:00〜18:00...）" oninput="parseText()"></textarea>
                <div style="margin-top: 10px; text-align: right;">
                    <button class="action-btn-primary" onclick="parseText()">⚡ データを解析・成形する</button>
                </div>

                <h3 style="margin-top: 25px; color: #2c3e50; font-size: 16px; border-left: 4px solid #2c3e50; padding-left: 8px;">📋 解析・確認用リスト</h3>
                <div class="parsed-result-container" id="parsed-result-list">
                    <div style="color: #7f8c8d; padding: 10px;">文章を貼り付けるとここに項目が整理されます。</div>
                </div>

                <div style="margin-top: 15px; display: flex; align-items: center; gap: 15px;">
                    <button class="action-btn-copy" onclick="copyParsedText()">整理されたテキストをコピー</button>
                    <span class="copy-alert-green" id="editor-copy-alert">コピーしました！</span>
                </div>
            </div>
        </div>

    </div>

    <div class="result-panel-fixed" id="result-panel">
        <div class="result-inner">
            <div class="layout-switcher">
                <span>パネル配置：</span>
                <button class="switch-btn active" id="btn-layout-bottom" onclick="changeLayout('bottom')">下部固定</button>
                <button class="switch-btn" id="btn-layout-right" onclick="changeLayout('right')">右側固定</button>
            </div>

            <div class="text-type-tabs">
                <button class="tab-btn active" id="tab-line" onclick="changeTextType('line')">LINE用</button>
                <button class="tab-btn" id="tab-email" onclick="changeTextType('email')">メール用</button>
                <button class="tab-btn" id="tab-memo" onclick="changeTextType('memo')">社内メモ用</button>
            </div>

            <h2>選択内容明細</h2>
            <ul class="summary-list" id="summary-list">
                <li class="summary-item">メニューが選択されていません</li>
            </ul>
            
            <div class="discount-area">
                <span>割引設定：</span>
                <select id="discount-type" onchange="calculateTotal()">
                    <option value="none">割引なし</option>
                    <option value="yen">円引き (¥)</option>
                    <option value="percent">％引き (%)</option>
                </select>
                <input type="number" id="discount-value" value="0" min="0" oninput="calculateTotal()" placeholder="数字を入力">
            </div>

            <div class="time-row">
                <span>合計所要時間</span>
                <span class="total-time" id="total-time">0分</span>
            </div>
            
            <div class="total-row">
                <span>合計金額 (税込)</span>
                <span class="total-price" id="total-price">¥0</span>
            </div>
            
            <div class="action-row">
                <button class="copy-btn" onclick="copyToClipboard()">選択内容をコピーする</button>
                <span class="copy-alert" id="copy-alert">コピーしました！</span>
            </div>

            <div class="estimate-note" id="estimate-note">※「金額：要見積」の項目が含まれています。別途お見積もりが必要です。</div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="text_editor.js"></script> </body>
</html>
