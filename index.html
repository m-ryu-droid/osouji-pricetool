<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メニュー料金計算ツール</title>
    <style>
        /* シックでシンプルな大人っぽいデザインのスタイル設定 */
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --primary-color: #2c3e50; /* シックなネイビーグレー */
            --text-color: #333333;
            --text-muted: #7f8c8d;
            --border-color: #e2e8f0;
            --accent-color: #c0392b; /* 警告や見積もり用の落ち着いた赤 */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin: 0 0 10px 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 各メニューカードのスタイル */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .menu-title-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 250px;
        }

        /* チェックボックスのカスタムスタイル */
        .custom-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .menu-label {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
        }

        .controls-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .qty-select {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .qty-select:disabled {
            background-color: #f8fafc;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .base-price {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-color);
            min-width: 100px;
            text-align: right;
        }

        /* オプションエリアのスタイル */
        .options-area {
            margin-top: 15px;
            padding-left: 30px;
            display: none; /* 初期状態は非表示（メニューチェックで開く） */
            flex-direction: column;
            gap: 10px;
        }

        .card.active .options-area {
            display: flex;
        }

        .option-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #555;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .option-price {
            color: var(--text-muted);
        }

        /* 計算結果表示エリア（固定フッター風） */
        .result-panel {
            background: var(--primary-color);
            color: #ffffff;
            border-radius: 8px;
            padding: 24px;
            margin-top: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .result-panel h2 {
            font-size: 18px;
            margin: 0 0 15px 0;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        .summary-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            font-size: 14px;
            max-height: 150px;
            overflow-y: auto;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 15px;
        }

        .total-price {
            font-size: 28px;
            letter-spacing: 0.05em;
        }

        .estimate-note {
            font-size: 12px;
            color: #f39c12;
            margin-top: 5px;
            text-align: right;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>見積料金計算ツール</h1>
        <div class="subtitle">メニューとオプションを選択してください（すべて税込表記）</div>
    </header>

    <div id="menu-container">
        </div>

    <div class="result-panel">
        <h2>選択内容明細</h2>
        <ul class="summary-list" id="summary-list">
            <li class="summary-item">メニューが選択されていません</li>
        </ul>
        <div class="total-row">
            <span>合計金額 (税込)</span>
            <span class="total-price" id="total-price">¥0</span>
        </div>
        <div class="estimate-note" id="estimate-note">※「金額：要見積」の項目が含まれています。別途お見積もりが必要です。</div>
    </div>
</div>

<script>
/**
 * =================================================================
 * ⚙️ データの編集・変更はここを書き換えてください（すべて税込価格）

 * 0円に設定すると画面上で自動的に「要見積」と表示されるようになっています。
 */
const menuData = [

        prices: {

        type: "aircon_normal",

            3: 54450
        },

    },
    {

        prices: { 1: 22000, 2: 40700, 3: 61050, 4: 81400, 5: 93500 },

        options: [
            { id: "coat", name: "防カビ抗菌コート", prices: { 1: 26400, 2: 46200, 3: 69300, 4: 92400, 5: 104500 } },
            { id: "outdoor", name: "室外機分解クリーニング", prices: { 1: 29150, 2: 48950, 3: 72050, 4: 95150, 5: 107250 } },
            { id: "both", name: "防カビ＋室外機", prices: { 1: 32450, 2: 52250, 3: 75350, 4: 98450, 5: 110550 } }
        ]
    },
    {
        id: "ceiling_2way",
        name: "【天井埋め込み型】2方向 エアコンクリーニング",
        type: "aircon_ceiling",
        prices: { 1: 24200, 2: 45100, 3: 62700, 4: 83600, 5: 104500 },
        maxQty: 5,
        options: [
            { id: "coat", name: "防カビ抗菌コート", prices: { 1: 28600, 2: 50600, 3: 70950, 4: 94600, 5: 115500 } },
            { id: "outdoor", name: "室外機分解クリーニング", prices: { 1: 31350, 2: 53350, 3: 73700, 4: 97350, 5: 118250 } },

        ]
    },
    {

        maxQty: 2,
        options: [

            { id: "outdoor", name: "室外機分解クリーニング", prices: { 1: 33550, 2: 56650 } },
            { id: "both", name: "防カビ＋室外機", prices: { 1: 37950, 2: 61050 } }
        ]
    },
    {
        id: "ceiling_suspended",
        name: "【天井吊り型】エアコンクリーニング",
        type: "aircon_ceiling",
        prices: { 1: 31625, 2: 63250, 3: 94875, 4: 126500 },
        maxQty: 4,
        options: [
            { id: "coat", name: "防カビ抗菌コート", prices: { 1: 36025, 2: 67650, 3: 99275, 4: 130900 } },
            { id: "outdoor", name: "室外機分解クリーニング", prices: { 1: 95150, 2: 87450, 3: 139645, 4: 193655 } }
        ]
    },
    {
        id: "water_set",
        name: "【お得なセット！】キッチン×換気扇×お風呂（水回り）",
        type: "water",
        prices: { 1: 44000 },
        maxQty: 1,
        options: [
            { id: "apron", name: "エプロン内部高圧洗浄", prices: { 1: 49500 } },
            { id: "uroko", name: "鏡のウロコ取り洗浄", prices: { 1: 47850 } }
        ]
    },
    {
        id: "kitchen_single",
        name: "【シンクやコンロを綺麗に！】キッチンクリーニング 1箇所",
        type: "water",
        prices: { 1: 16500 },
        maxQty: 1,
        options: [
            { id: "shokusen", name: "食洗機の水垢が気になるかた", prices: { 1: 22000 } },
            { id: "range", name: "レンジフード", prices: { 1: 27500 } },
            { id: "bath", name: "風呂清掃", prices: { 1: 38500 } }
        ]
    },
    {
        id: "water_5set",
        name: "【５点セット】お風呂×キッチン×レンジフード×トイレ×洗面",
        type: "single_menu",
        prices: { 1: 55000 },
        maxQty: 1,
        options: []
    },
    {
        id: "water_3set",
        name: "【3点セット】お風呂×キッチン×レンジフード",
        type: "single_menu",
        prices: { 1: 38500 },
        maxQty: 1,
        options: []
    },
    {
        id: "drain_pan",
        name: "エアコンのドレンパン清掃",
        type: "single_menu",
        prices: { 1: 550 },
        maxQty: 1,
        options: []
    },
    {
        id: "toilet",
        name: "トイレ",
        type: "single_menu",
        prices: { 1: 4950 },
        maxQty: 1,
        options: []
    },
    {
        id: "washroom",
        name: "洗面所（排水溝なし）",
        type: "single_menu",
        prices: { 1: 4400 },
        maxQty: 1,
        options: []
    }
];

// 💡 補足：CSV上の「└ 防カビ抗菌コート付きメニュー」などは、
// お客さまが混乱しないよう「メインメニューの単価がオプション適用価格に上書きされる形」でスマートに処理しています。

// HTML構造の組み立て
const container = document.getElementById('menu-container');

menuData.forEach(menu => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${menu.id}`;

    // 台数プルダウンの作成
    let qtyOptions = '';
    for(let i = 1; i <= menu.maxQty; i++) {
        qtyOptions += `<option value="${i}">${i}台</option>`;
    }

    // オプションHTMLの生成
    let optionsHtml = '';
    if (menu.options && menu.options.length > 0) {
        optionsHtml = `<div class="options-area">`;
        menu.options.forEach(opt => {
            optionsHtml += `
                <div class="option-item">
                    <label class="option-label">
                        <input type="checkbox" class="custom-checkbox opt-checkbox" data-menu-id="${menu.id}" data-opt-id="${opt.id}" onchange="calculateTotal()">
                        <span>${opt.name}</span>
                    </label>
                    <span class="option-price" id="price-text-${menu.id}-${opt.id}"></span>
                </div>
            `;
        });
        optionsHtml += `</div>`;
    }

    card.innerHTML = `
        <div class="menu-header">
            <div class="menu-title-area">
                <input type="checkbox" class="custom-checkbox main-checkbox" id="check-${menu.id}" data-menu-id="${menu.id}" onchange="toggleMenu('${menu.id}')">
                <label for="check-${menu.id}" class="menu-label">${menu.name}</label>
            </div>
            <div class="controls-area">
                <select class="qty-select" id="qty-${menu.id}" data-menu-id="${menu.id}" onchange="updatePrices('${menu.id}')" disabled>
                    ${qtyOptions}
                </select>
                <span class="base-price" id="base-price-text-${menu.id}">¥0</span>
            </div>
        </div>
        ${optionsHtml}
    `;

    container.appendChild(card);
    // 初期金額の表示を更新
    updatePriceTexts(menu);
});

// メニューの有効・無効切り替え
function toggleMenu(menuId) {
    const card = document.getElementById(`card-${menuId}`);
    const mainCheck = document.getElementById(`check-${menuId}`);
    const qtySelect = document.getElementById(`qty-${menuId}`);

    if (mainCheck.checked) {
        card.classList.add('active');
        qtySelect.disabled = false;
    } else {
        card.classList.remove('active');
        qtySelect.disabled = true;
        // メニューのチェックが外れたら配下のオプションチェックも外す
        const optChecks = card.querySelectorAll('.opt-checkbox');
        optChecks.forEach(cb => cb.checked = false);
    }
    calculateTotal();
}

// 台数やメニュー変更時に各価格表記を更新する
function updatePrices(menuId) {
    const menu = menuData.find(m => m.id === menuId);
    if(menu) {
        updatePriceTexts(menu);
    }
    calculateTotal();
}

// 金額テキストを画面上の各項目にセットする関数
function updatePriceTexts(menu) {
    const qty = parseInt(document.getElementById(`qty-${menu.id}`).value) || 1;
    
    // 基本料金のテキスト更新
    const basePrice = menu.prices[qty];
    const baseTextElem = document.getElementById(`base-price-text-${menu.id}`);
    baseTextElem.textContent = basePrice === 0 ? "要見積" : `¥${basePrice.toLocaleString()}`;

    // オプション料金のテキスト更新
    if (menu.options) {
        menu.options.forEach(opt => {
            const optPriceElem = document.getElementById(`price-text-${menu.id}-${opt.id}`);
            if (optPriceElem) {
                const price = opt.prices[qty];
                // CSV上の構造（オプションにチェックを入れると、基本料金ごと金額がスライドする）に対応
                if (price === 0) {
                    optPriceElem.textContent = "(要見積)";
                } else {
                    const diff = price - basePrice;
                    optPriceElem.textContent = diff >= 0 ? `(+¥${diff.toLocaleString()})` : `(割引 ¥${Math.abs(diff).toLocaleString()})`;
                }
            }
        });
    }
}

// 🧮 合計金額のリアルタイム計算コアロジック
function calculateTotal() {
    let total = 0;
    let hasEstimate = false;
    const summaryList = document.getElementById('summary-list');
    summaryList.innerHTML = ''; // クリア

    let selectedItemsCount = 0;

    menuData.forEach(menu => {
        const mainCheck = document.getElementById(`check-${menu.id}`);
        if (mainCheck && mainCheck.checked) {
            selectedItemsCount++;
            const qty = parseInt(document.getElementById(`qty-${menu.id}`).value) || 1;
            
            // チェックされているオプションを探す
            let activeOpt = null;
            if (menu.options) {
                menu.options.forEach(opt => {
                    const optCheck = document.querySelector(`input[data-menu-id="${menu.id}"][data-opt-id="${opt.id}"]`);
                    if (optCheck && optCheck.checked) {
                        activeOpt = opt; // 最後にチェックされているものを適用（CSVがセット価格構造のため単一適用）
                    }
                });
            }

            let itemPrice = 0;
            let itemNameStr = `${menu.name} (${qty}台)`;

            if (activeOpt) {
                itemPrice = activeOpt.prices[qty];
                itemNameStr += ` ＋ ${activeOpt.name}`;
            } else {
                itemPrice = menu.prices[qty];
            }

            // 金額加算と明細追加
            const li = document.createElement('li');
            li.className = 'summary-item';
            
            if (itemPrice === 0) {
                hasEstimate = true;
                li.innerHTML = `<span>${itemNameStr}</span><span style="color:#f39c12;">要見積</span>`;
            } else {
                total += itemPrice;
                li.innerHTML = `<span>${itemNameStr}</span><span>¥${itemPrice.toLocaleString()}</span>`;
            }
            summaryList.appendChild(li);
        }
    });

    if (selectedItemsCount === 0) {
        summaryList.innerHTML = '<li class="summary-item">メニューが選択されていません</li>';
    }

    // 合計金額の描画
    document.getElementById('total-price').textContent = `¥${total.toLocaleString()}`;
    
    // 見積もり注意書きの出し分け
    document.getElementById('estimate-note').style.display = hasEstimate ? 'block' : 'none';
}
</script>

</body>
</html>
