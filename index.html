<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-color=1.0">
    <title>メニュー料金計算ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>見積料金計算ツール</h1>
        <div class="subtitle">メニューとオプションを選択してください（すべて税込表記）</div>
    </header>

    <div id="menu-container">
        </div>
</div>

<div class="result-panel-fixed">
    <div class="result-inner">
        <h2>選択内容明細</h2>
        <ul class="summary-list" id="summary-list">
            <li class="summary-item">メニューが選択されていません</li>
        </ul>
        <div class="total-row">
            <span>合計金額 (税込)</span>
            <span class="total-price" id="total-price">¥0</span>
        </div>
        <div class="estimate-note" id="estimate-note">※「金額：要見積」の項目が含まれています。別途お見積もりが必要です。</div>
    </div>
</div>

<script href="script.js" src="script.js"></script>
</body>
</html>
